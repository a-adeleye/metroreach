<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <img src="assets/images/logo.png" alt="Metroreach" class="logo">
            <h1>Change Password</h1>
            <p>You must change your temporary password to continue.</p>
        </div>

        <form (ngSubmit)="handleChangePassword()" #passwordForm="ngForm" class="auth-form">
            <div class="form-group">
                <label for="currentPassword">Current Password</label>
                <div class="input-wrapper">
                    <i class="icon-lock"></i>
                    <input type="password" id="currentPassword" name="currentPassword" [(ngModel)]="currentPassword"
                        placeholder="Enter current password" required>
                </div>
            </div>

            <div class="form-group">
                <label for="newPassword">New Password</label>
                <div class="input-wrapper">
                    <i class="icon-lock"></i>
                    <input type="password" id="newPassword" name="newPassword" [(ngModel)]="newPassword"
                        placeholder="Enter new password" required>
                </div>
            </div>

            <div class="form-group">
                <label for="confirmPassword">Confirm New Password</label>
                <div class="input-wrapper">
                    <i class="icon-lock"></i>
                    <input type="password" id="confirmPassword" name="confirmPassword" [(ngModel)]="confirmPassword"
                        placeholder="Confirm new password" required>
                </div>
            </div>

            <div *ngIf="error()" class="error-message">
                {{ error() }}
            </div>

            <div *ngIf="success()" class="success-message">
                Password changed successfully! Redirecting...
            </div>

            <button type="submit" class="btn-primary" [disabled]="isLoading() || success()">
                <span *ngIf="!isLoading()">Update Password</span>
                <span *ngIf="isLoading()" class="loader"></span>
            </button>
        </form>
    </div>
</div>
