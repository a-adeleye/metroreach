<div class="login-wrapper">
    <div class="login-card">
        <div class="brand-section">
            <a routerLink="/" class="logo-link">
                <img src="metroreach-logo.png" alt="MetroReach" class="auth-logo">
                <p class="tagline">Fibre Deep, Reach Wide</p>
            </a>
        </div>

        @if (!isSubmitted()) {
        <div class="form-header">
            <h2>Forgot Password?</h2>
            <p>No worries, we'll send you reset instructions.</p>
        </div>

        <form (submit)="handleReset()" class="auth-form">
            <div class="form-field">
                <label>Email Address</label>
                <input type="email" [(ngModel)]="email" name="email" placeholder="user@example.com" required>
            </div>

            @if (error()) {
            <div class="error-notice">{{ error() }}</div>
            }

            <button type="submit" class="btn-auth" [disabled]="isLoading()">
                @if (!isLoading()) {
                <span>Reset Password</span>
                } @else {
                <div class="spinner-auth"></div>
                }
            </button>

            <div class="auth-footer" style="margin-top: 24px; text-align: center;">
                <a (click)="backToLogin()" class="back-link">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        style="width: 16px; height: 16px; display: inline; vertical-align: middle;">
                        <line x1="19" y1="12" x2="5" y2="12"></line>
                        <polyline points="12 19 5 12 12 5"></polyline>
                    </svg>
                    Back to login
                </a>
            </div>
        </form>
        } @else {
        <div class="link-success">
            <div class="success-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
                    <polyline points="20 6 9 17 4 12"></polyline>
                </svg>
            </div>
            <h3>Check your email</h3>
            <p>We've sent password reset instructions to <strong>{{ email }}</strong></p>
            <button class="btn-auth" style="margin-top: 24px;" (click)="backToLogin()">Back to login</button>
        </div>
        }
    </div>
</div>
