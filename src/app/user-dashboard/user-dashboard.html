<div class="dashboard-shell" [class.sidebar-hidden]="!isSidebarOpen()">
    <!-- Sidebar -->
    <aside class="dashboard-sidebar">
        <div class="sidebar-top">
            <a routerLink="/" class="logo-link">
                <img src="metroreach-logo.png" alt="MetroReach" class="sidebar-logo">
            </a>
            <button class="mobile-close" (click)="toggleSidebar()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="18" y1="6" x2="6" y2="18"></line>
                    <line x1="6" y1="6" x2="18" y2="18"></line>
                </svg>
            </button>
        </div>

        <nav class="sidebar-nav">
            @for (item of menuItems; track item.label) {
            <a [routerLink]="item.route" routerLinkActive="active" class="nav-link" (click)="closeSidebar()">
                <span class="nav-icon">
                    @switch (item.icon) {
                    @case ('grid') {
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="3" width="7" height="7"></rect>
                        <rect x="14" y="3" width="7" height="7"></rect>
                        <rect x="14" y="14" width="7" height="7"></rect>
                        <rect x="3" y="14" width="7" height="7"></rect>
                    </svg>
                    }
                    @case ('credit-card') {
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="1" y="4" width="22" height="16" rx="2" ry="2"></rect>
                        <line x1="1" y1="10" x2="23" y2="10"></line>
                    </svg>
                    }
                    @case ('package') {
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path
                            d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z">
                        </path>
                    </svg>
                    }
                    @case ('user') {
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                        <circle cx="12" cy="7" r="4"></circle>
                    </svg>
                    }
                    @case ('help-circle') {
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10"></circle>
                        <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"></path>
                        <line x1="12" y1="17" x2="12.01" y2="17"></line>
                    </svg>
                    }
                    }
                </span>
                <span class="nav-label">{{ item.label }}</span>
            </a>
            }
        </nav>

        <div class="sidebar-help">
            <div class="help-box">
                <p>Need help?</p>
                <p class="help-number">0800-METRO-HELP</p>
                <button class="btn-chat">Start Chat</button>
            </div>
            <button class="btn-logout" (click)="logout()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="logout-icon">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                    <polyline points="16 17 21 12 16 7"></polyline>
                    <line x1="21" y1="12" x2="9" y2="12"></line>
                </svg>
                Sign Out
            </button>
        </div>
    </aside>

    <!-- Main Content Area -->
    <main class="dashboard-main">
        <header class="dashboard-header">
            <div class="header-left">
                <button class="mobile-toggle" (click)="toggleSidebar()">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="3" y1="12" x2="21" y2="12"></line>
                        <line x1="3" y1="6" x2="21" y2="6"></line>
                        <line x1="3" y1="18" x2="21" y2="18"></line>
                    </svg>
                </button>
                <h1 class="page-title">{{ pageTitle() }}</h1>
            </div>
            <div class="header-right">
                <button class="btn-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
                        <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
                    </svg>
                </button>
                <div class="user-profile">
                    <div class="user-details">
                        <span class="user-name">{{ userFullName() }}</span>
                    </div>
                    <div class="user-avatar">
                        {{ userInitials() }}
                    </div>
                </div>
            </div>
        </header>

        <div class="dashboard-content">
            <router-outlet></router-outlet>
        </div>
    </main>


</div>
